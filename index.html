<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kertolasku-oppimispeli v2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            max-width: 700px;
            line-height: 1.6;
        }

        /* Osa 1 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 5px;
        }

        .input-line {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #display-line {
            font-size: 1.2em;
            font-weight: bold;
            min-height: 1.5em;
            color: #444;
        }

        input {
            width: 45px;
            padding: 8px;
            text-align: center;
            font-size: 1.1em;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #error-message {
            color: #d32f2f;
            font-weight: bold;
            height: 20px;
            margin: 5px 0 15px 0;
            visibility: hidden;
        }

        /* Osa 2: Pisteet */
        #dot-container {
            margin: 25px 0;
            display: grid;
            gap: 10px;
            justify-content: start;
            padding: 15px;
            border-radius: 8px;
            background-color: #f9f9f9;
            min-height: 50px;
        }

        .dot {
            width: 22px;
            height: 22px;
            background-color: #e53935;
            border-radius: 50%;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* Osa 3: Tulos */
        .results-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .equations {
            font-size: 1.6em;
            font-weight: bold;
            color: #2c3e50;
        }

        .equations div {
            margin-bottom: 5px;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        .btn-primary {
            background-color: #2196F3;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="input-line">
            <input type="text" id="num1" placeholder="Rivit">
            <span>&middot;</span>
            <input type="text" id="num2" placeholder="Sarakkeet">
            <button class="btn-primary" onclick="naytaKertolasku()">Näytä</button>
        </div>
        
        <div id="display-line"></div>
        
        <div class="input-line">
            <button onclick="uudetLuvut()">Uudet luvut</button>
            <button id="plus-one-btn" onclick="lisaaSarake()">+1</button>
        </div>
    </div>

    <div id="error-message">Anna luku 1-10 eli kirjoita vain numeroita</div>

    <div id="dot-container"></div>

    <div class="results-container">
        <div class="equations" id="results-area">
            <div id="eq1"></div>
            <div id="eq2"></div>
        </div>
        <button onclick="tyhjenna()">Tyhjennä</button>
    </div>

    <script>
        let gridVisible = false;

        function naytaKertolasku() {
            const val1 = document.getElementById('num1').value;
            const val2 = document.getElementById('num2').value;
            const errorDiv = document.getElementById('error-message');
            
            const n1 = parseInt(val1);
            const n2 = parseInt(val2);

            // Validointi
            if (isNaN(n1) || isNaN(n2) || n1 < 1 || n1 > 10 || n2 < 1 || n2 > 10) {
                errorDiv.style.visibility = 'visible';
                setTimeout(() => {
                    errorDiv.style.visibility = 'hidden';
                }, 5000);
                return;
            }

            piirra(n1, n2);
        }

        function piirra(n1, n2) {
            const dotContainer = document.getElementById('dot-container');
            const displayLine = document.getElementById('display-line');
            const eq1 = document.getElementById('eq1');
            const eq2 = document.getElementById('eq2');

            // Päivitä keskirivi (Osa 1, rivi 2)
            displayLine.textContent = `${n1} · ${n2}`;

            // Tyhjennä ja luo pisteet
            dotContainer.innerHTML = '';
            dotContainer.style.gridTemplateRows = `repeat(${n1}, 22px)`;
            dotContainer.style.gridTemplateColumns = `repeat(${n2}, 22px)`;

            for (let i = 0; i < n1 * n2; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dotContainer.appendChild(dot);
            }

            // Päivitä tulokset (Osa 3)
            eq1.textContent = `${n1} · ${n2} = ${n1 * n2}`;
            eq2.textContent = `${n2} · ${n1} = ${n1 * n2}`;
            
            gridVisible = true;
        }

        function uudetLuvut() {
            const r1 = Math.floor(Math.random() * 10) + 1;
            const r2 = Math.floor(Math.random() * 10) + 1;
            
            document.getElementById('num1').value = r1;
            document.getElementById('num2').value = r2;
            
            piirra(r1, r2);
        }

        function lisaaSarake() {
            if (!gridVisible) return;

            let n1 = parseInt(document.getElementById('num1').value);
            let n2 = parseInt(document.getElementById('num2').value);

            if (n2 < 10) {
                n2++;
                document.getElementById('num2').value = n2;
                piirra(n1, n2);
            } else {
                // Valinnainen: ilmoita jos ylittää 10
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = "Maksimi on 10 saraketta";
                errorDiv.style.visibility = 'visible';
                setTimeout(() => {
                    errorDiv.style.visibility = 'hidden';
                    errorDiv.textContent = "Anna luku 1-10 eli kirjoita vain numeroita";
                }, 3000);
            }
        }

        function tyhjenna() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('display-line').textContent = '';
            document.getElementById('dot-container').innerHTML = '';
            document.getElementById('eq1').textContent = '';
            document.getElementById('eq2').textContent = '';
            document.getElementById('error-message').style.visibility = 'hidden';
            gridVisible = false;
        }
    </script>

</body>
</html>
